ProblemaNegócio_Contexto: 'O setor offshore de O&G enfrenta desafios logísticos significativos devido à operação em ambientes
  remotos e hostis, exigindo gestão complexa de supply chains com múltiplos modos de transporte.

  Modelos operacionais tradicionais são arcaicos, com duplicação de recursos (embarcações, mão de obra, equipamentos), processos
  baseados em papel, e falta de visibilidade em tempo real.

  Isso resulta em ineficiências, altos custos operacionais, consumo excessivo de combustível e elevadas emissões de CO2, além
  de dificuldades de coordenação entre stakeholders.'
