  Trecho: The data was collected from P Petrochemical Company in Iran. Established in the late 2000 s in western Iran, P Petrochemical produces materials used in the manufacturing of feed for downstream units, polyethylene films, polyethylene foams, wire and cable coverings, and plastic components.
  Página: p.7
- QuoteID: Q002
  TipoQuote: Intervenção
  Trecho: This study introduces a novel hybrid intelligent framework that integrates Most Productive Scale Size Data Envelopment Analysis (MPSS-DEA) with three Artificial intelligence (AI) algorithms—Artificial Neural Networks (ANNs), K-Nearest Neighbors (KNN), and Chi-squared Automatic Interaction Detection (CHAID)—to enhance both accuracy and scalability in supplier evaluation.
  Página: p.1
- QuoteID: Q003
  TipoQuote: Mecanismo
  Trecho: The innovation lies in the synergy between DEA's robust efficiency evaluation and the predictive power of AI-ML mrthods, enabling accurate classification of suppliers into efficient and inefficient categories, while significantly reducing computational time.
  Página: p.2
- QuoteID: Q004
  TipoQuote: Mecanismo
  Trecho: The integration of MPSS-DEA with AI not only improves decision-making quality but also enables real-time supplier replacement, risk assessment, and strategic planning.
  Página: p.3
- QuoteID: Q005
  TipoQuote: Outcome
  Trecho: Applied to 362 suppliers and 38 sustainability criteria in the petrochemical industry, the proposed framework achieved high classification accuracies of 92.5% (DEA-CHAID), 91.9% (DEANN), and 91.4% (DEA-KNN). The model also demonstrated strong discrimination power, with ROC AUC scores of 0.96, 0.95, and 0.94, respectively.
  Página: p.1
- QuoteID: Q006
  TipoQuote: Outcome
  Trecho: Predictor importance analysis revealed that some of the features, such as R2, SE2, QA4, CA6, and DE3, were the most influential features across all models.
  Página: p.1
- QuoteID: Q007
  TipoQuote: Limitação
  Trecho: The framework was tested only in the petrochemical industry, which may limit its generalizability to other sectors. AI algorithms require large, high-quality datasets; however, data availability is restricted in some industries due to confidentiality.
  Página: p.21
- QuoteID: Q008
  TipoQuote: Método
  Trecho: 'Efficiency rates are used to gauge supplier sustainability: an efficiency rate (eo) of one indicates sustainability, while eo < 1 indicates unsustainability. Based on these results, suppliers are categorized into sustainable and unsustainable groups.'
  Página: p.6
