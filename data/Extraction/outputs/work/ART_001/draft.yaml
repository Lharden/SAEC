ProcessoSCM_Alvo: Seleção/qualificação de fornecedores
TipoRisco_SCRM: Risco de fornecimento
ObjetoCrítico: Fornecedores de matérias-primas e componentes para indústria petroquímica
ProblemaNegócio_Contexto: 'A seleção de fornecedores sustentáveis tornou-se um imperativo estratégico para cadeias de suprimentos resilientes na indústria petroquímica. Métodos tradicionais de avaliação falham em lidar com grandes volumes de dados e métricas dinâmicas de sustentabilidade, resultando em decisões subótimas. A empresa P Petrochemical no Irã trabalha com mais de 7000 fornecedores de diversos setores, incluindo matérias-primas de óleo e gás, materiais de polietileno, equipamentos elétricos e peças de reposição. O processo de identificação e substituição de fornecedores inadequados é demorado e propenso a erros, especialmente na era do big data.

  '
ClasseIA: Híbrido
ClasseIA_Confiança: Alta
TarefaAnalítica: Classificação
FamíliaModelo: 'Redes neurais feedforward; Outro: Árvore de decisão (CHAID); Outro: Instance-based/KNN'
TipoDado: Tabular/ERP
Maturidade: Piloto
Maturidade_Confiança: Alta
Intervenção_Descrição: 'Framework híbrido inteligente que integra MPSS-DEA (Most Productive Scale Size Data Envelopment Analysis) com três algoritmos de IA: ANN (Artificial Neural Networks com MLP), KNN (K-Nearest Neighbors) e CHAID (Chi-squared Automatic Interaction Detection). O DEA classifica fornecedores em eficientes (MPSS) e ineficientes (não-MPSS) baseado em scores de eficiência. Os algoritmos de IA são então treinados para classificar novos fornecedores e identificar os critérios mais influentes para sustentabilidade.

  '
Dados_Descrição: 'Dataset coletado da empresa P Petrochemical no Irã, com 362 fornecedores e 38 critérios de sustentabilidade (subcritérios) organizados em 8 dimensões principais: Qualidade, Capacidade, Custos, Risco, CSR, Entrega, Controle de Cronograma e Serviço. Os dados são qualitativos, obtidos via questionários distribuídos a pessoal de diversas divisões (procurement, gestão geral, importação/exportação, compras e vendas). Dataset particionado em 70% treino e 30% teste.

  '
CategoriaMecanismo: Padronização/consistência
Mecanismo_Fonte: Misto
Mecanismo_Declarado: 'O framework reduz a complexidade computacional do DEA tradicional ao integrar algoritmos de IA, permitindo classificação rápida de fornecedores sem recálculo completo. A integração do MPSS-DEA com IA não apenas melhora a qualidade da tomada de decisão mas também permite substituição de fornecedores em tempo real, avaliação de riscos e planejamento estratégico.

  '
Mecanismo_Inferido: 'INFERIDO: O DEA estabelece benchmark de eficiência produtiva que padroniza a avaliação de fornecedores em múltiplas dimensões de sustentabilidade. INFERIDO: Os algoritmos de IA aprendem padrões dos labels gerados pelo DEA, permitindo classificação consistente de novos fornecedores sem reprocessamento do modelo matemático completo. INFERIDO: A análise de importância de preditores identifica critérios-chave que mais influenciam a classificação, permitindo foco em variáveis críticas para sustentabilidade.

  '
Mecanismo_Estruturado: Dados de fornecedores (38 critérios) → MPSS-DEA (classificação eficiente/ineficiente) + ANN/CHAID/KNN (aprendizado supervisionado) → Scores de eficiência + importância de features → Seleção sustentável de fornecedores
ResultadoTipo: Quantitativo
Resultados_Quant: 'Acurácia DEA-CHAID: 92.5% (baseline: NR); Acurácia DEANN: 91.9% (baseline: NR); Acurácia DEA-KNN: 91.4% (baseline: NR); ROC AUC DEA-CHAID: 0.96 (baseline: NR); ROC AUC DEANN: 0.95 (baseline: NR); ROC AUC DEA-KNN: 0.94 (baseline: NR); Taxa de misclassificação DEA-CHAID: 7.5% (baseline: NR)'
Resultados_Qual: 'Framework permite substituição de fornecedores em tempo real, reduz complexidade computacional do DEA, suporta análise de ciclo de vida e promove transparência na seleção de fornecedores. Critérios mais influentes identificados: R2, SE2, QA4, CA6, DE3.'
NívelEvidência: Estudo de caso real
Limitações_Artigo: 'Framework testado apenas na indústria petroquímica, limitando generalizabilidade. Algoritmos de IA requerem datasets grandes e de alta qualidade; disponibilidade de dados é restrita em algumas indústrias por confidencialidade. Modelo MPSS-DEA não é adequado para ambientes incertos ou fuzzy. Alguns modelos de IA como ANN carecem de interpretabilidade, reduzindo confiança gerencial. Avaliação inicial do DEA baseada em snapshots estáticos de dados. Treinamento de múltiplos modelos de IA demanda recursos computacionais significativos.

  '
Observação: 'Artigo publicado em 2026 (data futura), possivelmente erro de publicação ou preprint. O estudo usa SPSS Modeler versão 18.0 e GAMS versão 25.1.2. O termo "petrochemical" indica downstream da cadeia de O&G.

  '
