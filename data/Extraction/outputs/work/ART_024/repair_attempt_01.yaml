Complexidade_Justificativa: F1=0 (ambiente não especificado), F2=1 (processo de licitação envolve múltiplos fornecedores e contratos complexos), F3=1 (risco de viés humano e erros em avaliações críticas de contratos)
ProcessoSCM_Alvo: Seleção/qualificação de fornecedores; Procurement/compras; Gestão de contratos
TipoRisco_SCRM: Risco de fornecimento; Risco operacional
ObjetoCrítico: Processo de avaliação técnica de propostas e licitações; contratos de serviços de drilling e produção
ProblemaNegócio_Contexto: 'O processo de avaliação de propostas técnicas na indústria de óleo e gás é trabalhoso, intensivo em mão de obra e suscetível a viés humano.

  As empresas dependem de abordagens tradicionais com revisões manuais extensivas de documentos escaneados não estruturados.

  A implementação de LLMs isoladamente, sem integração com técnicas de data analytics e ML, resultou em interpretações errôneas significativas devido à natureza complexa dos documentos de licitação.

  Empresas de O&G preferem soluções on-premises por questões de privacidade.'
ClasseIA: Híbrido
ClasseIA_Confiança: Alta
TarefaAnalítica: Extração de informação (NLP)
FamíliaModelo: Transformers/Attention; Redes neurais feedforward
TipoDado: Texto
Maturidade: Protótipo
Maturidade_Confiança: Alta
Intervenção_Descrição: 'Sistema baseado em LLM (LlaMa2) integrado com OCR, NLP e data analytics para automatizar avaliação técnica de licitações. O workflow inclui: extração de dados via OCR e LlamaParse, embeddings com sentence transformers (allmpnet-base-v2), vector store para busca semântica, RAG avançado para recuperação contextual, e fine-tuning supervisionado via QLoRA/PEFT para comparação de cláusulas contratuais. Implementa chat buffering para manter contexto em conversas prolongadas.

  '
Dados_Descrição: 'Documentos técnicos de dois contratos expirados relacionados a operações de produção e drilling. Primeiro contrato com aproximadamente 30 páginas cobrindo equipamentos, químicos, serviços e novas tecnologias. Segundo contrato com quase 50 páginas focado em químicos, tradenames e serviços. Mais de 150 itens precificados nos contratos estudados, reduzidos a 20 itens críticos baseados em critérios de operações esperadas. Dados mascarados por questões de privacidade.

  '
CategoriaMecanismo: Automação informacional (NLP)
Mecanismo_Fonte: Misto
Mecanismo_Declarado: 'O artigo declara que a implementação de LLM no processo de licitação provou ser promissora para revisar e classificar dados técnicos das propostas submetidas com base em critérios pré-definidos. O RAG melhora a performance dos LLMs garantindo recuperação de contexto relevante de fontes externas através de cálculos de similaridade semântica. O fine-tuning supervisionado ajuda a minimizar alucinações e melhorar a capacidade de comparação de cláusulas entre diferentes contratos.

  '
Mecanismo_Inferido: 'INFERIDO: A transformação de documentos escaneados em formatos estruturados via OCR e parsers elimina a barreira de dados não estruturados e permite processamento automatizado. INFERIDO: Os embeddings e vector stores capturam similaridade semântica, permitindo busca e comparação eficiente entre especificações técnicas e datasheets de fornecedores. INFERIDO: O RAG previne alucinações ao restringir o modelo a raciocinar apenas dentro do contexto fornecido, aumentando a confiabilidade das respostas. INFERIDO: O fine-tuning via QLoRA adapta o modelo para compreender variações na descrição de serviços entre contratos, melhorando matching semântico.

  '
Mecanismo_Estruturado: Documentos escaneados de licitação → OCR + LLM (LlaMa2) + RAG + SFT → Extração estruturada + Similaridade semântica + Comparação automatizada → Avaliação técnica padronizada e acelerada
ResultadoTipo: Misto
Resultados_Quant: 'Acurácia de extração LlamaParse: >95% vs OCR tradicional: 75% (baseline: OCR pytesseract); Acurácia de avaliação de especificações: 83% (baseline: NR); Acurácia de query no contrato original: 100% com human feedback vs 70% sem human feedback (baseline: sem feedback); Melhoria de 5% em similarity matching após SFT (baseline: sem SFT)'
Resultados_Qual: LLMs demonstram potencial significativo para auxiliar engenheiros técnicos no processo de avaliação. A incorporação de feedback humano melhora substancialmente o processo e maximiza os resultados.
