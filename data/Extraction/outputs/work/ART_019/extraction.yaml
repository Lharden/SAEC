ObjetoCrítico: Volume de transações de ordens de compra (purchase order transaction volume)
ProblemaNegócio_Contexto: 'A cadeia de suprimentos da indústria de O&G é conhecida por sua complexidade e incerteza.

  O processo atual de previsão de Unit of Activity (UoA), como volume de transações, depende de abordagens manuais e inconsistentes devido à natureza descentralizada dos dados, derivados de múltiplas ferramentas e sistemas.

  Diversos especialistas empregam métodos distintos para medição e estimativa de UoA, resultando em ineficiências e imprecisões que prejudicam o desempenho ótimo da cadeia de suprimentos.'
ClasseIA: ML supervisionado
