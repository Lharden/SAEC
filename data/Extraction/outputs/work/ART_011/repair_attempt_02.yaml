Maturidade: Protótipo
Maturidade_Confiança: Média
Intervenção_Descrição: 'The framework integrates three decision models: (1) Price prediction using System Dynamics (SD), Multiple Linear Regression (MLR), and Artificial Neural Network (ANN) to forecast naphtha and product prices; (2) Paper trading model using Nonlinear Programming (NLP) to determine optimal naphtha purchase timing and quantity for financial risk hedging; (3) Production planning model using Mixed Integer Linear Programming (MILP) to optimize naphtha-cracking yield, inventory levels, and product sales timing based on predicted prices.

  '
Dados_Descrição: 'Historical monthly price data from May 2009 to December 2010 used for training prediction models, with forecasting for January to December 2011. The study considered 35 descriptors including historical prices, demand/supply quantities, crude oil reference prices, and financial statistics (margin, cash flow). The case study examines a real petrochemical plant with 3.6 million tons/year naphtha capacity, 0.3 million tons/month cracking process capacity, and storage tanks ranging from 80,000 to 300,000 tons.

  '
CategoriaMecanismo: Antecipação de risco | Otimização de trade-offs
Mecanismo_Fonte: Declarado
Mecanismo_Declarado: 'The framework reduces financial risk by predicting future prices and enabling paper trading to hedge against price volatility. Price prediction with ~82.3% accuracy allows determination of optimal purchase timing when prices are expected to be low. The production planning model adapts cracking yields and inventory levels based on predicted prices - storing products when favorable sale prices are expected and selling at most favorable periods.

  '
Mecanismo_Inferido: 'INFERIDO: The integration of price prediction with production planning enables proactive inventory positioning before price movements occur. INFERIDO: Paper trading creates a financial buffer that offsets losses from incorrect predictions in some months with gains in others. INFERIDO: The System Dynamics model provides causal loop understanding between market factors, enabling better anticipation of price trends.

  '
Mecanismo_Estruturado: Historical price/market data → SD/ANN/MLR prediction + MILP optimization → Optimal timing/quantity decisions → Maximized operating profit with reduced financial risk
ResultadoTipo: Quantitativo
Resultados_Quant: 'Operating profit improvement: 13.8% (vs. baseline: Case 1 without any model); Total sales improvement: 5.50% (5.23 billion USD vs. baseline: 4.95 billion USD); Annual operating profit: 338 million USD (vs. baseline: 297 million USD); Paper trading net profit: ~20 million USD annually; Price prediction accuracy: 82.3%'
Resultados_Qual: The comprehensive decision framework enables petrochemical companies to make intelligent decisions on purchase timing, inventory management, production strategy, and financial risk hedging under volatile market conditions
NívelEvidência: Simulação com dados reais
Limitações_Artigo: 'The proposed framework still has limits as a complete business intelligence which enables real petrochemical industries to make strategic decisions. Future research needs to address diversification of the petrochemical value chain including different raw material options and product markets, integration of system-level solutions including optimal yield with process operation policy.

  '
Observação: 'The study examines 7 different cases with combinations of decision models (price prediction, paper trading, adaptive operation strategy). The SD model was selected for its capability of both quantitative and qualitative analysis, providing causality understanding between descriptors unlike MLR and ANN which are limited to output prediction.

  '
