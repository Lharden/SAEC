ObjetoCrítico: Estratégias de adoção de blockchain na cadeia de suprimentos de O&G
ProblemaNegócio_Contexto: 'O setor de Oil & Gas enfrenta ineficiências causadas por processos decisórios convencionais baseados em papel em sua cadeia de suprimentos.

  A falta de transparência, segurança e rastreabilidade nos sistemas existentes de gestão da cadeia de suprimentos representa desafios significativos.

  A pesquisa avalia a integração de tecnologia blockchain como solução estratégica, considerando fatores organizacionais, de cadeia de suprimentos, tecnológicos e externos para identificar as estratégias de implantação mais eficazes no setor norueguês de O&G.'
