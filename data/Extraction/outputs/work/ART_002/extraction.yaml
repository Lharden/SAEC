ProblemaNegócio_Contexto: 'A seleção de fornecedores em empresas petrolíferas é crítica para otimização do ciclo de produção, refino e distribuição.

  Os métodos tradicionais são limitados por avaliação subjetiva individual, regras de avaliação incorretas e métodos de decisão ineficientes.

  A complexidade do processo com grande volume de dados e múltiplos critérios torna difícil a tomada de decisão eficiente.

  O estudo visa criar um processo inteligente para avaliação e análise de fornecedores, reduzindo tempo, custo e erros humanos no processo de seleção.'
