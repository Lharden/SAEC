- QuoteID: Q002
  TipoQuote: Intervenção
  Trecho: The models follow the base temporal map design with different weighting on model inputs. With a temporal map, a sequence of monthly data values (called lags) is used to predict the next monthly value in the sequence. The lags are rolled so that there are six months of data for the model to predict on. All models also use boosted decision-tree-based ensemble machine learning algorithm.
  Página: p.1
- QuoteID: Q003
  TipoQuote: Mecanismo
  Trecho: The key outcome is that the AI model provides a way to identify where the traditional forecast might be off or misleading and provides the necessary information to challenge it along with specifying how to correct it.
  Página: p.9
- QuoteID: Q004
  TipoQuote: Outcome
  Trecho: Across five years of predictions (2016 to 2019), the models were able to predict with 78% average accuracy for the top 10 products by volume which represents 75% of inventory volume. Across the same time-period, they were able to predict with 73% average accuracy on all 17 products which account for 80% percent of inventory volume.
  Página: p.1
- QuoteID: Q005
  TipoQuote: Outcome
  Trecho: Further iterative updates with additional data led to improvement in results and the model where the model predicted with an improved accuracy of 83% on the top 17 products and an accuracy of 86% on the top 10 products.
  Página: p.8
