ObjetoCrítico: Processo de avaliação técnica de licitações (technical bid evaluation)
ProblemaNegócio_Contexto: 'OQEP é uma subsidiária do OQ Group atuando no setor upstream de Oil & Gas em Omã.

  O processo de avaliação técnica de licitações (procurement) é majoritariamente manual e baseado em papel, resultando em ineficiências significativas.

  A preparação de templates consome 5-15 horas, a avaliação manual leva 60-70% mais tempo que métodos automatizados, e há risco de 20-25% de perda de informação crítica.

  O processo completo sofre atrasos de 4-5 semanas, impactando cronogramas de projetos e gerando custos não previstos por alterações de design após a adjudicação.'
