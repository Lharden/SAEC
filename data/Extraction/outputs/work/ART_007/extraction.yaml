ProblemaNegócio_Contexto: 'A indústria de óleo e gás opera em ambiente complexo com riscos significativos de gestão da cadeia de suprimentos.

  A volatilidade dos preços de energia e a situação macroeconômica criada pela COVID-19 evidenciaram a necessidade

  de práticas de supply chain resilientes e robustas. O setor tem sido lento em reconhecer o valor estratégico do SCM,

  permanecendo em abordagens táticas e reativas, expondo-se a riscos de volatilidade de mercado e crises globais.'
