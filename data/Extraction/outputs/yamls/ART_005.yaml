Intervenção_Descrição: 'Modelo preditivo de classificação usando Random Forest para prever a probabilidade de um alerta resultar em tapping ilegal. Cinco algoritmos foram testados: Logistic Regression, Random Forest, XGBoost, CatBoost e MLP. O Random Forest apresentou melhor desempenho. O modelo utiliza quatro variáveis explicativas: duração do alerta, histórico de tapping ilegal na área, número de eventos próximos e hora do dia. Otimização de cutoff via Youden Index com peso maior para reduzir falsos negativos.

  '
Dados_Descrição: 'Dados do sistema de monitoramento SIMF (Sistema de Monitoramento de Faixas) da Transpetro, de janeiro 2019 a maio 2021. Base inicial com ~215.000 registros de alertas. Após filtros (remoção de alertas de manutenção, consideração apenas de alertas verificados por patrulha, agrupamento de alertas próximos), resultaram 4.423 alertas negativos e 69 positivos. Aplicação de matched case-control study (proporção 3:1) resultou em base final de 276 alertas (69 positivos, 207 negativos). Validação externa com dados de junho-agosto 2021 (841 alertas).

  '
CategoriaMecanismo: Priorização/alocação ótima
Mecanismo_Fonte: Misto
Mecanismo_Declarado: '"Applying these techniques will help optimize the company''s handling of these suspected fuel theft events, avoiding sending unnecessary patrols to the site. Most importantly, the model aims to assist the decision-making and the alerts'' correct prioritization." (p.2)

  '
Mecanismo_Inferido: 'INFERIDO: O modelo transforma dados brutos de alertas em probabilidades de tapping ilegal, permitindo ranking de prioridade. INFERIDO: A identificação de fatores influentes (duração, histórico, período noturno) fornece critérios objetivos que substituem julgamento subjetivo do analista. INFERIDO: A redução de falsos negativos garante que eventos críticos não sejam negligenciados, enquanto a especificidade reduz envio desnecessário de patrulhas.

  '
Mecanismo_Estruturado: Alertas do SIMF + variáveis contextuais → Random Forest + otimização de cutoff → Probabilidade de tapping com priorização → Redução de patrulhas desnecessárias e detecção de eventos críticos
ResultadoTipo: Quantitativo
Resultados_Quant: 'Acurácia: 76.8% (baseline: NR); Especificidade: 68.3% (baseline: NR); Sensibilidade: 100% (baseline: NR); Validação externa - Acurácia: 61% (baseline: NR); Especificidade: 61% (baseline: NR); Sensibilidade: 75% (baseline: NR)'
Resultados_Qual: 'Modelo em uso operacional pela Transpetro para priorização de alertas e melhoria da eficiência de resposta de patrulhas. Identificação dos fatores mais influentes: duração do alerta, histórico de eventos na área e período noturno.'
NívelEvidência: Estudo de caso real
Limitações_Artigo: '"The limitation of this study lies in the lack of integration between the databases used, which required us to perform them manually." (p.8) Autores também mencionam como trabalho futuro a aplicação de estratégias de balanceamento e teste de outras técnicas como SVM.

  '
Observação: 'Artigo descreve implementação real em empresa brasileira (Transpetro) com validação externa em dados prospectivos. Modelo está em uso operacional ("Transpetro uses the developed predictive model"). A escolha do cutoff ótimo priorizou minimizar falsos negativos dado o impacto crítico de não identificar um tapping ilegal real.

  '
