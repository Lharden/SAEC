ObjetoCrítico: Oleodutos e gasodutos (pipelines) - detecção de furto de combustível via tapping ilegal
ProblemaNegócio_Contexto: 'O furto de combustível em oleodutos é um problema enfrentado por diversos países e empresas de O&G devido ao impacto ambiental e riscos à segurança das comunidades próximas.

  No Brasil, a Transpetro registrou mais de 200 casos anuais de tentativas ou furtos efetivos.

  O monitoramento via sensores gera milhares de alertas que precisam ser priorizados para envio de patrulhas de verificação.

  A decisão de priorização é tradicionalmente baseada no conhecimento do analista, sendo essencial identificar rapidamente quais alertas têm maior probabilidade de confirmar um tapping ilegal para otimizar recursos operacionais e mitigar riscos.'
