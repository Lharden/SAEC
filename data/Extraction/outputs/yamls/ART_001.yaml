# NARRATIVAS
ProblemaNegócio_Contexto: |
  A seleção de fornecedores sustentáveis (SSS) é estratégica para cadeias resilientes, mas métodos tradicionais falham em lidar com grandes conjuntos de dados e métricas dinâmicas de sustentabilidade, levando a decisões subótimas. No setor petroquímico, a escala (362 fornecedores, 38 critérios) e a complexidade ambiental/social exigem ferramentas analíticas avançadas.

# INTERVENÇÃO (I)
ClasseIA: "Híbrido"
ClasseIA_Confiança: "Alta"
TarefaAnalítica: "Classificação"
FamíliaModelo: "Redes neurais feedforward, Instance-based/KNN, Árvore de decisão"
TipoDado: "Tabular/ERP"
Maturidade: "Piloto"
Maturidade_Confiança: "Alta"

Intervenção_Descrição: |
  Framework híbrido integrando MPSS-DEA com três algoritmos de IA: MLP (ANN), KNN e CHAID. Primeiro, MPSS-DEA classifica fornecedores em MPSS (Most Productive Scale Size) e não-MPSS; em seguida, os modelos de IA são treinados sobre essas classes para classificação sustentável.

Dados_Descrição: |
  362 fornecedores da indústria petroquímica iraniana, 38 critérios de sustentabilidade (econômicos, ambientais, sociais). Dados divididos em 70% treino / 30% teste. Variáveis incluem R2, SE2, QA4, CA6, DE3, entre outras (ver Tabelas 6–8).

# MECANISMO (M)
CategoriaMecanismo: "Priorização/alocação ótima"
Mecanismo_Fonte: "Misto"
Mecanismo_Declarado: |
  "The proposed framework offers real-time supplier replacement, reduced computational complexity, and modular adaptability across industries."
Mecanismo_Inferido: |
  INFERIDO: A combinação MPSS-DEA + IA reduz espaço de busca ao pré-classificar fornecedores em grupos eficientes/ineficientes. INFERIDO: A integração de múltiplos algoritmos (MLP, KNN, CHAID) compensa limitações individuais, melhorando robustez da classificação. INFERIDO: O uso de features mais influentes (ex: CA6, DE3) permite priorização objetiva baseada em critérios sustentáveis.
Mecanismo_Estruturado: "Dados de fornecedores (38 critérios) → MPSS-DEA (classificação inicial) + IA (MLP/KNN/CHAID) → Classificação sustentável → Seleção/reposição de fornecedores"

# OUTCOME (O)
ResultadoTipo: "Quantitativo"
Resultados_Quant: "Acurácia: 92.5% (DEA-CHAID), 91.9% (DEANN), 91.4% (DEA-KNN) (vs. baseline: NR); ROC AUC: 0.96, 0.95, 0.94 (respectivamente)"
Resultados_Qual: "Redução de tempo de seleção, suporte à substituição em tempo real, modularidade para diferentes setores, transparência e alinhamento com padrões globais de sustentabilidade."
