TipoDado: Tabular/ERP
Maturidade: Protótipo
Maturidade_Confiança: Alta
Intervenção_Descrição: 'Modelo híbrido baseado em CBR (Case-Based Reasoning) integrado com data mining e redes neurais. O
  framework inclui três módulos: (1) CBR Case Development usando árvore de decisão para extrair regras e Gain Ratio para ponderação
  de atributos; (2) CBR Solution Provider usando SOM baseado em K-Prototype para clustering da base de casos e recuperação
  de casos similares; (3) CBR Advisor usando MLP neural network como sistema especialista para validação e feedback. O modelo
  segue o processo CRISP-DM para preparação de dados.

  '
Dados_Descrição: 'Base de dados de fornecedores de uma empresa petrolífera com 1430 registros originais, reduzidos para 1118
  após limpeza. Cada registro contém 36 atributos iniciais, dos quais 29 foram selecionados para o modelo. Os dados foram
  divididos em 70% para treinamento, 20% para teste e 10% para validação. Os 8 atributos com maior peso foram utilizados como
  variáveis de decisão, incluindo: status code, delivery location, fulfillment/technical spec compliance, AVL code, entre
  outros.

  '
CategoriaMecanismo: Padronização/consistência
Mecanismo_Fonte: Misto
Mecanismo_Declarado: '"This model which finally leads to optimal selection and ranking of suppliers, reducing the time and
  cost in the selection process and also reduced human errors by using data mining techniques and neural networks in the reasoning
  method cycle based on the case."

  '
Mecanismo_Inferido: 'INFERIDO: O clustering SOM reduz o espaço de busca ao agrupar fornecedores similares, permitindo recuperação
  mais eficiente de casos relevantes. INFERIDO: A árvore de decisão extrai regras objetivas que substituem julgamentos subjetivos,
  padronizando critérios de avaliação. INFERIDO: A rede neural MLP atua como sistema especialista que valida propostas e fornece
  feedback consistente. INFERIDO: O Gain Ratio pondera objetivamente a importância de cada atributo, eliminando viés na definição
  de pesos.

  '
Mecanismo_Estruturado: Dados históricos de fornecedores → CBR + clustering SOM + MLP → Padronização de critérios e recuperação
  de casos similares → Seleção e ranking otimizado de fornecedores
ResultadoTipo: Misto
Resultados_Quant: 'Davies-Bouldin Index: 0.3525 para k=3 clusters (vs. baseline: 0.5203 para k=2); Similaridade máxima de
  recuperação: 79.5% (baseline: NR)'
Resultados_Qual: Redução de erros humanos; melhoria de acurácia e eficiência; 6 de 8 variáveis de decisão validadas por especialistas;
