ObjetoCrítico: Inventory Holding Points (IHPs) e rotas de transporte na rede global de supply chain
ProblemaNegócio_Contexto: 'A Borouge, empresa petroquímica joint venture entre ADNOC e Borealis, opera uma rede global de
  supply chain com planta de produção em Al Ruwais (UAE), 22

  Inventory Holding Points distribuídos globalmente e 390 portos servindo 112 países. A empresa necessitava de um digital
  twin para otimização de rede logística e planejamento de

  supply chain, visando selecionar os IHPs ótimos para atender clientes com base em custos, capacidades e lead times, reduzindo
  custos logísticos variáveis enquanto mantém níveis de

  serviço.'
ClasseIA: Otimização/heurísticas
ClasseIA_Confiança: Alta
TarefaAnalítica: Otimização
FamíliaModelo: Programação matemática
TipoDado: Tabular/ERP
Maturidade: Produção
Maturidade_Confiança: Alta
Intervenção_Descrição: 'Digital twin de supply chain desenvolvido usando Supply Chain Guru X (SCGX) para otimização de rede
  e Data Guru para transformação de dados. O modelo utiliza algoritmos de otimização de rede multi-echelon, simulação de eventos
  discretos e otimização de rotas de transporte. Permite criação de múltiplos cenários para avaliar diferentes configurações
  de IHPs, capacidades e políticas de sourcing, comparando custos logísticos variáveis (LVC), utilização de DIT e inventário
  final.

  '
Dados_Descrição: 'Dados de 12 meses incluindo: plano de produção, previsão de demanda, dados históricos de transporte, posição
  de inventário da rede. Master data de IHPs, mapeamentos cliente-país, 400-500 SKUs, capacidades de embalagem e armazenamento.
  Dados transacionais de invoices, transferências de estoque, inventário on-hand e planos de produção. Taxas de transporte
  para frete marítimo, ferroviário e rodoviário. Modelo com 22 IHPs, 211 InPos (reduzidos de 390), 112 clientes agregados
  por país.

  '
CategoriaMecanismo: Otimização de trade-offs
Mecanismo_Fonte: Misto
Mecanismo_Declarado: 'O modelo permite comparar diferentes cenários baseados em critérios como LVC (Logistics Variable Cost),
  utilização de DIT e inventário final. A otimização de seleção de IHP é feita removendo restrições da baseline para permitir
  que o modelo encontre soluções que não estão limitadas aos fluxos impostos para mimetizar a baseline, chegando a configurações
  de rede que minimizam custos.

  '
Mecanismo_Inferido: 'INFERIDO: O digital twin integra dados dispersos de múltiplas fontes (ERP, transporte, inventário) em
  um modelo unificado, permitindo visão holística da rede. INFERIDO: A simulação de cenários what-if permite antecipar bottlenecks
  e problemas em períodos futuros antes que ocorram. INFERIDO: A otimização multi-objetivo balanceia trade-offs entre custo,
  capacidade e nível de serviço para encontrar configuração ótima de rede.

  '
Mecanismo_Estruturado: Dados de produção, demanda, transporte e inventário → Otimização de rede multi-echelon e simulação
  → Avaliação quantitativa de trade-offs custo-serviço → Seleção ótima de IHPs com redução de 9% em custos logísticos
ResultadoTipo: Misto
Resultados_Quant: 'Redução de custos logísticos: 9% (vs. baseline: cenário atual 12 meses)'
Resultados_Qual: Maior visibilidade da rede; capacidade de simular cenários what-if; autonomia para análise estratégica; identificação
  proativa de bottlenecks futuros; redução do tempo para geração de relatórios; método quantitativo para avaliação de estratégias
  alternativas
NívelEvidência: Estudo de caso real
Limitações_Artigo: 'Os autores mencionam que custos do último leg (porto de destino ao cliente) não são modelados na rede.
  Há necessidade de validação e aprovação de etapas intermediárias por stakeholders que podem não ter entendimento completo
  da tecnologia. O modelo opera em nível de aproximação mais alto usando critérios de agregação e simplificação, diferindo
  de sistemas transacionais que analisam dados no máximo nível de detalhe. Desafios incluem converter requisitos operacionais
  complexos para requisitos estratégicos e balancear múltiplos requisitos de cenários de diferentes usuários.

  '
Observação: 'O artigo descreve implementação de digital twin usando ferramentas comerciais (Supply Chain Guru X e Data Guru)
  em empresa petroquímica downstream. Embora não use ML/AI no sentido estrito, utiliza algoritmos de otimização avançados
  embarcados na plataforma SCGX. O projeto foi desenvolvido em 8 meses e está em produção com execução mensal.

  '
