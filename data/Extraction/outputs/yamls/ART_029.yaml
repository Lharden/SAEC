Maturidade: Protótipo
Maturidade_Confiança: Alta
Intervenção_Descrição: 'Rede neural BP (backpropagation) com arquitetura 24×7×1 construída em MATLAB R2024b usando função
  newff. Os 24 indicadores de resiliência ponderados pelo método de entropia servem como inputs, e o score de resiliência
  como output. Taxa de aprendizado 0.01, threshold de erro 1×10⁻⁶, máximo 1000 iterações. Modelo usado para previsão de resiliência
  2023-2032 sob quatro cenários.

  '
Dados_Descrição: 'Dados de indicadores da indústria de petróleo e gás da China de 2001-2022 obtidos do China Statistical Yearbook,
  China Energy Statistical Yearbook e relatórios anuais de desenvolvimento do setor. Dataset com 22 observações temporais
  e 24 variáveis indicadoras. Divisão: 70% treino, 30% teste. Valores ausentes imputados por interpolação linear.

  '
CategoriaMecanismo: Antecipação de risco
Mecanismo_Fonte: Misto
Mecanismo_Declarado: '"It can reflect the interactive relationship between the resilience level and the elements of the OGI
  system, and it is used to simulate and predict the development status of resilience in the OGI, providing an important basis
  for measuring changes in industry resilience."

  '
Mecanismo_Inferido: 'INFERIDO: A rede neural BP captura padrões não-lineares nas relações entre indicadores multidimensionais
  e resiliência agregada. INFERIDO: A simulação multi-cenário permite comparar trajetórias de desenvolvimento sob diferentes
  condições de política e mercado. INFERIDO: A ponderação por entropia reduz viés subjetivo na agregação de indicadores heterogêneos.
  INFERIDO: O modelo fornece antecipação quantificada de níveis de resiliência futuros para suporte à decisão estratégica.

  '
Mecanismo_Estruturado: Indicadores históricos ponderados → BP neural network com cenários parametrizados → Scores de resiliência
  previstos → Comparação de trajetórias para decisão estratégica
ResultadoTipo: Misto
Resultados_Quant: 'R² treino: 0.846 (baseline: NR); R² teste: 0.829 (baseline: NR); Erro médio absoluto: <10% exceto 1 amostra
  (baseline: NR); Cenário green-transition: +5.49% resiliência até 2032 (vs. baseline 2022)'
Resultados_Qual: Modelo demonstrou boa capacidade de replicação comportamental e alta força preditiva; Cenário de transformação
  verde apresentou maior potencial de melhoria de resiliência; Inovação e recuperação emergem como drivers dominantes de resiliência
NívelEvidência: Simulação com dados reais
Limitações_Artigo: 'Autores reconhecem que valores de alguns indicadores foram derivados por interpolação devido a registros
  históricos incompletos, podendo introduzir erros de medição. Variações em padrões estatísticos entre fontes de dados podem
  afetar consistência do dataset. Previsões de longo prazo estão sujeitas a incerteza inerente pois desenvolvimentos econômicos,
  tecnológicos e políticos futuros não podem ser previstos com alta precisão.

  '
Observação: 'Estudo foca em resiliência industrial agregada nacional, não em operações específicas de supply chain. A aplicação
  de IA é para previsão macroeconômica setorial com foco em políticas públicas.

  '
