ObjetoCrítico: Resiliência da cadeia de suprimentos de petróleo e gás da China
ProblemaNegócio_Contexto: 'A indústria de petróleo e gás da China enfrenta crescente dependência de importações (>72% petróleo
  bruto, ~45% gás natural) combinada com incertezas geopolíticas, eventos climáticos extremos e pressões de transição energética.

  A avaliação e previsão da resiliência industrial tornou-se crítica para garantir a segurança energética nacional.

  O estudo busca desenvolver um sistema de indicadores multidimensionais de resiliência e prever cenários futuros para subsidiar
  políticas de desenvolvimento sustentável do setor.'
ClasseIA: Deep Learning
