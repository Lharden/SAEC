# NARRATIVAS CONTEXTUAIS
ProblemaNegócio_Contexto: |
  A seleção de fornecedores em empresas de petróleo é crítica para a segurança nacional e economia, afetando diretamente o ciclo de produção e refino. Métodos tradicionais dependem de avaliações subjetivas, regras incorretas e são ineficientes, resultando em erros humanos e alto custo de tempo. Há a necessidade de um processo inteligente e objetivo para lidar com o alto volume de dados e a complexidade da cadeia de suprimentos do setor.

# INTERVENÇÃO (I)
ClasseIA: "Híbrido"
ClasseIA_Confiança: "Alta"
TarefaAnalítica: "Classificação"
FamíliaModelo: "CBR/Especialista; Redes neurais feedforward; Clustering"
TipoDado: "Tabular/ERP"
Maturidade: "Piloto"
Maturidade_Confiança: "Alta"
Intervenção_Descrição: |
  O modelo híbrido integra Case-Based Reasoning (CBR), Árvores de Decisão, Redes Neurais e Self-Organizing Maps (SOM) com K-Prototype. A árvore de decisão extrai regras (if-then) para criar a base de casos; o SOM clusteriza os dados para recuperação rápida; e a rede neural atua como um sistema especialista para validar e revisar as decisões de seleção de fornecedores.
Dados_Descrição: |
  Foram utilizados dados históricos de um banco de dados de uma empresa de petróleo. O dataset inicial continha 1430 registros, que após limpeza resultaram em 1118 registros. Foram extraídos 36 atributos, dos quais 29 foram selecionados (ex: preço, tempo de entrega, flexibilidade), divididos em 70% para treino, 20% para teste e 10% para validação.

# MECANISMO (M)
CategoriaMecanismo: "Padronização/consistência"
Mecanismo_Fonte: "Misto"
Mecanismo_Declarado: |
  The results of Supplier Selection Based Data Mining represent a repeating pattern of "if … then …" and understanding and interpretation of the rules is very simple. Reducing the impact of human error by replacing it with expert system based on neural network is another useful outcome of this study.
Mecanismo_Inferido: |
  INFERIDO: A integração de árvores de decisão com CBR permite extrair regras claras e objetivas de dados históricos. INFERIDO: O uso de redes neurais como sistema especialista reduz a dependência de julgamentos humanos subjetivos. INFERIDO: O clustering (SOM) organiza a base de casos, acelerando a recuperação de fornecedores similares e otimizando o tempo de decisão.
Mecanismo_Estruturado: "Dados históricos de fornecedores → Árvore de decisão + CBR + SOM + Redes Neurais → Extração de regras e recuperação de casos similares → Seleção e classificação padronizada de fornecedores"

# OUTCOME (O)
ResultadoTipo: "Misto"
Resultados_Quant: "Davies-Bouldin index: 0.3525 para k=3 (vs. baseline: k=2 com 0.5203)"
Resultados_Qual: "O modelo reduziu erros humanos, melhorou a acurácia e a eficiência no processo de seleção de fornecedores, com 6 das 8 variáveis de decisão extraídas sendo validadas por especialistas do setor."
