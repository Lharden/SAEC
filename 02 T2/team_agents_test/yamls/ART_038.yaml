ProblemaNegócio_Contexto: |
  A logística de transporte de petróleo e produtos petrolíferos envolve múltiplos participantes com comportamentos únicos (navios, terminais, caminhões). O contexto operacional russo inclui condições climáticas extremas (gelo no Ártico com mais de 2 metros de espessura) que complicam a navegação. Métodos tradicionais de modelagem (System Dynamics)抽象am de objetos individuais e usam abordagem agregada, sendo insuficientes para capturar a complexidade das interações entre agentes. A necessidade de tomar múltiplas decisões interdependentes em tempo real exige ferramentas mais sofisticadas.
