Intervenção_Descrição: |
  O estudo implementa modelagem baseada em agentes (Agent-Based Modeling - ABM) no software AnyLogic para simular processos de transporte, carregamento e descarregamento de produtos petrolíferos. Os navios são modelados como agentes autônomos que interagem entre si e com o ambiente. O modelo considera princípios de interação entre petroleiros e quebra-gelos, lógica de escolha de velocidade dependendo da plenitude do terminal, severidade das condições de gelo, posição de outras embarcações, temperatura do ar e outros fatores. O modelo integra módulos de GIS, cálculos shipbuilding e simulação logística.
Dados_Descrição: |
  O modelo foi desenvolvido pelo Krylov State Scientific Centre para o campo Novoportovskoye da PJSC Gazprom Neft. Dados incluem: características de navios (petroleiros, quebra-gelos), condições ambientais (gelo, temperatura), lógica de operações de terminal, rotas de exportação (100km de oleoduto até terminal marítimo no Cabo Kamenny, depois transporte por petroleiros árticos). O modelo permite experimentação com diferentes parâmetros para análise what-if.
CategoriaMecanismo: "Integração de dados dispersos"
Mecanismo_Fonte: "Declarado"
Mecanismo_Declarado: |
  "MAS as systems of distributed AI have the following benefit: They speed up task fulfilment by parallelism and save the volume of data transmitted bypassing high-level partial solutions to other agents. They are flexible by using agents of various capacities to carry out a task dynamically in cooperation. They are reliable by-passing functions from agents unable to carry out a task to other ones." (p.109)
Mecanismo_Inferido: |
  INFERIDO: A modelagem baseada em agentes permite representar o comportamento individual de cada participante da cadeia logística. INFERIDO: Cada agente possui autonomia e objetivos próprios, adaptando seu comportamento conforme as interações. INFERIDO: O modelo integra múltiplas fontes de dados (GIS, shipbuilding, condições ambientais) em uma plataforma unificada. INFERIDO: A simulação permite testar cenários what-if para suporte à decisão estratégica.
Mecanismo_Estruturado: "Dados denavios, ambiente e operações → Modelagem de comportamento de agentes → Simulação de interações → Recomendação de rotas e capacidade"
ResultadoTipo: "Qualitativo"
Resultados_Quant: "(baseline: NR)"
Resultados_Qual: "Experimento 1: Aumentar volume de tanques de 30m3 para 500m3 resulta em caminhão de combustível não chegar ao posto por muito mais tempo. Experimento 2: Diminuir volume para 4m3 resulta em déficit de combustível no posto. Experimento 3: Aumentar taxa de descarga de 25l/s para 150l/s reduz significativamente a probabilidade de déficit."
NívelEvidência: "Simulação com dados reais"
Limitações_Artigo: |
  "The main disadvantage of agent modelling compared to SD is that it is often difficult to develop a detailed agent model that takes into account all the cause and effect relationships that affect the agent's decision." (p.109)
Observação: |
  O artigo é uma revisão teórica e análise comparativa de metodologias de simulação (System Dynamics vs Agent-Based), com exemplo ilustrativo de implementação. A classificação de maturidade como "Piloto" reflete que o modelo foi desenvolvido para caso real (Gazprom Neft) mas não há evidência de uso contínuo em produção.
