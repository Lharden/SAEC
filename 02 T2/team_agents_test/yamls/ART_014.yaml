# NARRATIVAS CONTEXTUAIS
ProblemaNegócio_Contexto: |
  Falhas de mud motors (power sections) durante perfuração direcional ocorrem sob condições operacionais “extremely challenging”, gerando manutenção corretiva cara e falhas imprevisíveis com alto custo (NPT).
  O setor carecia de procedimentos confiáveis para monitorar e manter a saúde dessas seções de potência, levando a over-maintenance e retirements prematuros.
  O contexto é a operação de drilling (well construction), com necessidade de decisões em tempo real para evitar falhas e ajustar parâmetros operacionais sem sacrificar desempenho (ROP) e confiabilidade.

# INTERVENÇÃO (I)
ClasseIA: "Híbrido"
