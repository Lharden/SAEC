ProblemaNegócio_Contexto: |
  Borouge, empresa líder em soluções de polímeros, necessitava de um gêmeo digital para planejamento de supply chain, especificamente para otimização e simulação da rede logística. O contexto envolve a planta de produção em Al Ruwais (EAU), múltiplos Inventory Holding Points (IHPs) globais e portos de destino. O objetivo era selecionar o ponto ideal de manutenção de inventário (IHP) entre Al Ruwais e o porto de destino para minimizar custos de rede, considerando custos, capacidades e prazos de entrega. Métodos tradicionais de planejamento de rede eram manuais e não permitiam simulação what-if rápida.
Intervenção_Descrição: |
  O modelo foi desenvolvido utilizando Supply Chain Guru X e Data Guru, criando um gêmeo digital da rede de supply chain com 4 níveis (echelons): planta (Al Ruwais), IHPs, portos de destino (InPo) e clientes finais. O modelo ingere dados de produção, demanda, custos de transporte, capacidades de embalagem e inventário, e restrições de lead time. Permite criar cenários para otimização de seleção de IHP, modificação de capacidades, ajustes de ratios de transporte, e avaliação what-if de diferentes estratégias de rede.
Dados_Descrição: |
  Baseline baseado em 12 meses de plano de produção (M0-M11), previsão de demanda, dados históricos de transporte, posição de inventário de rede e fechamentos planejados de sites. Dados de custos modelados: embalagem ($/ton), manuseio, armazenamento ($/ton/mês), transporte. Restrições incluem capacidade de embalagem (tons/mês por linha), capacidade de lane de transporte, capacidade de inventário e transit times. Dados históricos de movimento de produtos através de todas as lanes foram utilizados para construir o baseline.
CategoriaMecanismo: "Otimização de trade-offs; Integração de dados dispersos"
Mecanismo_Fonte: "Declarado"
Mecanismo_Declarado: |
  O modelo permite comparação de diferentes cenários baseados em critérios como LVC (Logistics Variable Cost), DIT (Delay in Transit) utilization e ending inventory. O modelo fornece volumes, a nível de material, a serem enviados de Ruwais para IHPs e de IHPs para portos de destino. Os cenários permitem otimizar seleção de IHP, modificar SLA ratios, modificar capacidade de throughput/storage, fechar/abrir IHPs, alterar custos de transporte, e definir volume ratio entre DIT e Warehouse IHPs.
Mecanismo_Inferido: |
  INFERIDO: O modelo integra dados dispersos de múltiplas fontes (produção, demanda, transporte, inventário) em uma representação unificada da rede. INFERIDO: A otimização via algoritmos de programação matemática encontra a combinação ótima de IHPs que minimiza custos totais respeitando restrições de capacidade. INFERIDO: A simulação multi-período permite avaliar implicações futuras de decisões atuais e identificar gargalos antecipadamente.
Mecanismo_Estruturado: "Dados de supply chain (produção, demanda, custos, capacidades) → Modelo de otimização e simulação → Recomendação de IHP e cenários → Decisão de rede otimizada"
ResultadoTipo: "Quantitativo"
Resultados_Quant: "Redução potencial de custos de até 9% dos custos logísticos de supply chain comparada ao baseline para o período de 12 meses"
Resultados_Qual: "O modelo fornece visibilidade de custos por echelon da rede, múltiplos relatórios e visualizações, capacidade de avaliar quantitativamente vantagens e desvantagens de diferentes estratégias de rede, e detecção antecipada de problemas no horizonte de 12 meses."
NívelEvidência: "Estudo de caso real"
Limitações_Artigo: "NR"
Observação: |
  Artigo apresenta implementação real em produção na Borouge (empresa petroquímica). O foco é otimização de rede logística, não gestão de riscos de supply chain. A complexidade foi classificada como Baixa pois não envolve ambiente offshore, múltiplos fornecedores de materiais, nem riscos críticos explicitados.
