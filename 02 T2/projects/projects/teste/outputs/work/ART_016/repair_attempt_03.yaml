Resultados_Qual: O artigo relata sucesso na automação de relatórios MTO a partir de P&IDs, extração inteligente de listas de materiais, e clouds de revisão/escopo. Há também risco de inacessibilidade de dados digitais ao longo da vida útil da planta (30-50 anos), comprometendo a utilização futura por modelos de IA.
