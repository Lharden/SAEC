ObjetoCrítico: Inventory Holding Points (IHPs) e rotas de transporte na rede global de supply chain
ProblemaNegócio_Contexto: 'A Borouge, empresa petroquímica joint venture entre ADNOC e Borealis, opera uma rede global de supply chain com planta de produção em Al Ruwais (UAE), 22

  Inventory Holding Points distribuídos globalmente e 390 portos servindo 112 países. A empresa necessitava de um digital twin para otimização de rede logística e planejamento de

  supply chain, visando selecionar os IHPs ótimos para atender clientes com base em custos, capacidades e lead times, reduzindo custos logísticos variáveis enquanto mantém níveis de

  serviço.'
ClasseIA: Otimização/heurísticas
ClasseIA_Confiança: Alta
