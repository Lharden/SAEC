ObjetoCrítico: Risco de cauda (tail risk) e spillovers entre empresas da cadeia de suprimentos de petróleo
ProblemaNegócio_Contexto: 'As empresas da cadeia de suprimentos de petróleo são vulneráveis a choques externos e podem afetar significativamente outras indústrias em cenários extremos.

  A volatilidade dos preços do petróleo afeta custos de energia, inflação e gera choques sistêmicos através de canais comerciais, de investimento e financeiros.

  Com a transição energética e neutralidade de carbono, o perfil de risco de carbono do petróleo tornou-se mais saliente, com preços e demanda exibindo sensibilidade elevada a políticas verdes, choques climáticos e conflitos geopolíticos.

  Medir com precisão os spillovers de risco de cauda entre empresas da cadeia de petróleo é crucial para elucidar a transmissão de risco nos mercados de energia e salvaguardar a estabilidade industrial e a segurança do sistema financeiro.'
