ObjetoCrítico: Rotas e scheduling de transporte de produtos refinados de petróleo
ProblemaNegócio_Contexto: 'O mercado de produtos refinados de petróleo enfrenta competição crescente com múltiplos players (Sinopec, PetroChina, CNOOC, Sinochem, empresas estrangeiras e refinarias locais).

  A situação de oferta excedendo a demanda e guerras de preços impactam severamente a capacidade das empresas de gerar eficiência.

  É necessário usar métodos científicos de scheduling para melhorar o nível de distribuição logística, otimizar direções de transporte, reduzir despesas de transporte e melhorar a capacidade de garantia de fornecimento.'
