ObjetoCrítico: Materiais exóticos para piping (duplex, super duplex, titanium)
ProblemaNegócio_Contexto: 'Projetos FPSO enfrentam atrasos significativos e estouros de orçamento devido à complexidade da construção e conversão.

  Estudo de 9 projetos FPSO revelou overrun combinado de 38% e atraso coletivo de 12 anos.

  O setor de piping é particularmente crítico, representando 60-70% da duração total devido à aquisição de materiais exóticos (duplex, super duplex, titanium) com poucos fornecedores qualificados.

  A aquisição de materiais exóticos requer 5-7 meses, representando 1/6 do cronograma total de 36 meses do projeto.'
