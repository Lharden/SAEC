ObjetoCrítico: Transporte marítimo de petróleo em condições árticas e operações de carga/descarga de produtos petrolíferos
ProblemaNegócio_Contexto: 'Empresas petrolíferas russas verticalmente integradas enfrentam desafios complexos no transporte de petróleo e derivados.

  O caso específico do campo Novoportovskoye envolve transporte marítimo através de um canal de 500 km em gelo com mais de 2 metros de espessura no Golfo de Ob e Mar de Kara.

  Os decisores precisam determinar número de navios, necessidade de quebra-gelos, capacidade de terminais onshore, e coordenar múltiplos agentes (navios, terminais, dutos, refinarias, caminhões) em ambiente dinâmico e incerto.'
