Mecanismo_Declarado: '"The prescriptive analysis uses statistical models and ML algorithms to define the possibilities and
  to recommend actions. These models and algorithms can discover patterns in big data that human analysts may overlook."

  '
Mecanismo_Inferido: 'INFERIDO: A integração de múltiplas técnicas analíticas (S-Curve, Financial Pinch, Clustering, MICE)
  permite capturar diferentes dimensões do problema de decisão. INFERIDO: A combinação de análise descritiva e prescritiva
  reduz incerteza ao transformar dados brutos em recomendações acionáveis. INFERIDO: O ML identifica padrões em big data que
  analistas humanos não conseguem detectar, permitindo decisões mais informadas. INFERIDO: A abordagem blended permite comparação
  entre métodos e seleção da técnica mais adequada para cada contexto específico.

  '
Mecanismo_Estruturado: Dados multi-fonte (projeto, risco, fiscal, mercado) → ML + técnicas estatísticas (clustering, regressão,
  redes neurais) → Identificação de padrões e recomendações → Suporte à decisão estratégica de investimento
