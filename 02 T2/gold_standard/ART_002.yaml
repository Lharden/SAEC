ObjetoCrítico: "Fornecedores para cadeia de suprimentos de empresas petrolíferas"

ProblemaNegócio_Contexto: |
  O artigo trata a seleção de fornecedores como decisão crítica para desempenho da cadeia em produção, refino e distribuição.
  Os autores apontam fragilidades dos métodos tradicionais: subjetividade, regras de avaliação inconsistentes e baixa eficiência decisória.
  O problema ocorre em ambiente com alto volume de dados e múltiplos atributos de fornecedores.
  A proposta busca reduzir custo/tempo de seleção e diminuir erro humano com um processo orientado por IA.

ClasseIA: "Híbrido"
ClasseIA_Confiança: "Alta"
TarefaAnalítica: "Classificação"
FamíliaModelo: "CBR/Especialista; Redes neurais feedforward; Clustering; Outro: Árvore de decisão"
TipoDado: "Tabular/ERP"
Maturidade: "Piloto"
Maturidade_Confiança: "Média"

Intervenção_Descrição: |
  O modelo combina CBR com data mining em três módulos: criação de casos, recuperação/reuso e advisor.
  Usa árvore de decisão para extrair regras if-then, SOM baseado em K-Prototype para clustering e MLP como expert/advisor.
  O fluxo integra ponderação por Gain Ratio, recuperação de casos similares e recomendação final de fornecedor.

Dados_Descrição: |
  Foram coletados 1430 registros, reduzidos para 1118 após limpeza de dados.
  Cada item tinha 36 atributos iniciais, com 29 atributos selecionados para modelagem.
  O particionamento foi 70% treino, 20% teste e 10% validação.
  A implementação do pipeline utilizou SPSS Clementine/Orange e MATLAB em uma base real de empresa petrolífera.

CategoriaMecanismo: "Padronização/consistência"
Mecanismo_Fonte: "Misto"
Mecanismo_Declarado: |
  This model which finally leads to optimal selection and ranking of suppliers, reducing the time and cost in the selection process and also reduced human errors by using data mining techniques and neural networks in the reasoning method cycle based on the case.
Mecanismo_Inferido: "INFERIDO: A árvore de decisão codifica regras estáveis de seleção e reduz variação subjetiva entre avaliadores. INFERIDO: O clustering SOM/K-Prototype restringe o espaço de busca para casos comparáveis e acelera recuperação. INFERIDO: O CBR com feedback de rede neural reforça consistência entre casos históricos e novas decisões de fornecedor."
Mecanismo_Estruturado: "Dados históricos de fornecedores → Gain Ratio + árvore de decisão + CBR/SOM/MLP → Regras e casos similares padronizados → Seleção e ranking de fornecedores com menor erro humano"

ResultadoTipo: "Misto"
Resultados_Quant: "Davies-Bouldin index: 0.3525 para k=3 (vs. baseline: k=2 = 0.5203); Similaridade máxima de recuperação de caso: 79.5% (vs. baseline: NR)"
Resultados_Qual: "Os autores reportam redução de erro humano, melhoria de acurácia e melhor eficiência geral no processo de supplier selection."
NívelEvidência: "Experimento com dados reais"
Limitações_Artigo: |
  The results achieved in the ﬁrst, showing the 8 decision variables extracted from the model to the experts, they number six variables of the decision were approved.
  Experts have disagreement among them about the remaining variables in the model proposed code status and role in creating rules.
Observação: |
