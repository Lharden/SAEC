ProblemaNegócio_Contexto: 'CNOOC enfrentava desafios na gestão de produção offshore com dados não integrados em data lake,

  afetando acesso em tempo real e tomada de decisão. A falta de sistemas automatizados para gestão

  de produção de óleo e gás resultava em baixa eficiência operacional. Operações diárias careciam

  de plataforma unificada de informação, exigindo coleta manual de dados de produção e parâmetros

  operacionais de equipamentos. O objetivo era reduzir custos operacionais e de manutenção em 10%

  através de monitoramento inteligente e manutenção preditiva.'
