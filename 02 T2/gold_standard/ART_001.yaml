ProblemaNegócio_Contexto: |
  A seleção de fornecedores sustentáveis tornou-se um gargalo estratégico em cadeia petroquímica com alto volume de dados.
  Métodos tradicionais de avaliação não lidam bem com múltiplos critérios econômicos, ambientais e sociais, gerando decisões subótimas.
  O contexto exige decisões rápidas para manter continuidade operacional e reduzir risco de atrasos e perdas.
  O estudo busca uma forma escalável de classificar fornecedores eficientes e ineficientes com maior consistência.

ClasseIA: "Híbrido"
