TipoDado: "Tabular/ERP"
Maturidade: "Piloto"
Maturidade_Confiança: "Alta"

Intervenção_Descrição: |
  O framework combina MPSS-DEA com três algoritmos de IA: ANN (MLP), KNN e CHAID.
  Primeiro, o MPSS-DEA produz os rótulos de eficiência; depois os modelos aprendem a classificar fornecedores em MPSS/non-MPSS.
  A arquitetura foi desenhada para reduzir tempo de avaliação e permitir substituição mais rápida de fornecedores.

Dados_Descrição: |
  O estudo foi aplicado na P Petrochemical (Irã) com 362 fornecedores e 38 critérios de sustentabilidade.
  Os critérios cobrem dimensões econômicas, ambientais e sociais para avaliação integrada de supplier performance.
  Foram usados dados reais do caso industrial e processamento em ambiente SPSS Modeler para os modelos híbridos.

CategoriaMecanismo: "Priorização/alocação ótima"
Mecanismo_Fonte: "Misto"
Mecanismo_Declarado: |
  The framework alleviates the computational complexity typically associated with traditional DEA models, especially in big data contexts.
  By integrating AI algorithms, the model significantly reduces runtime and enables accurate classification of suppliers into efficient (MPSS) and inefficient (non-MPSS) categories.
Mecanismo_Inferido: "INFERIDO: O MPSS-DEA cria uma base objetiva de eficiência para treinar os classificadores com menor subjetividade. INFERIDO: ANN, KNN e CHAID transformam a avaliação multicritério em decisão de triagem escalável e repetível. INFERIDO: A classificação automática acelera a substituição de fornecedores e reduz exposição a falhas de abastecimento."
Mecanismo_Estruturado: "Dados multicritério de fornecedores → MPSS-DEA + ANN/KNN/CHAID → Classificação MPSS/non-MPSS e priorização → Seleção e substituição de fornecedores com menor tempo de decisão"

ResultadoTipo: "Misto"
Resultados_Quant: "Acurácia DEA-CHAID: 92.5% (vs. baseline: NR); Acurácia DEA-ANN: 91.9% (vs. baseline: NR); Acurácia DEA-KNN: 91.4% (vs. baseline: NR); ROC AUC DEA-CHAID: 0.96 (vs. baseline: NR); ROC AUC DEA-ANN: 0.95 (vs. baseline: NR); ROC AUC DEA-KNN: 0.94 (vs. baseline: NR)"
Resultados_Qual: "O modelo melhora velocidade de avaliação, permite substituição mais ágil de fornecedores e amplia transparência na decisão com foco em sustentabilidade."
NívelEvidência: "Estudo de caso real"
Limitações_Artigo: |
  The framework was tested only in the petrochemical industry, which may limit its generalizability to other sectors.
  AI algorithms require large, high-quality datasets; however, data availability is restricted in some industries due to confidentiality.
  The MPSS-DEA model is not suitable for uncertain or fuzzy environments; fuzzy-based models may be more appropriate in such contexts.
  The initial DEA evaluation is based on static data snapshots and may not reflect dynamic supplier conditions.

