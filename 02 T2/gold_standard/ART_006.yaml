ObjetoCrítico: Relatórios ESG e práticas de sustentabilidade corporativa
ProblemaNegócio_Contexto: 'A cadeia de suprimentos global de óleo e gás enfrenta intensa pressão por compliance ambiental
  e alegações de greenwashing em relatórios de sustentabilidade.

  Com governos mandando publicação de relatórios ESG periodicamente, as empresas são compelidas a demonstrar compromisso com
  sustentabilidade, porém há ceticismo crescente sobre transparência e precisão dos relatórios.

  A análise tradicional desses relatórios é subjetiva e intensiva em mão de obra, criando necessidade de soluções automatizadas,
  escaláveis e objetivas.'
ClasseIA: NLP
ClasseIA_Confiança: Alta
TarefaAnalítica: Classificação
FamíliaModelo: 'Outro: Sentiment Analysis (TextBlob)'
TipoDado: Texto
Maturidade: Protótipo
Maturidade_Confiança: Alta
Intervenção_Descrição: 'Framework unificado baseado em NLP para avaliar compliance ambiental e detectar greenwashing em relatórios
  ESG. O sistema possui 5 módulos: extração de dados de PDFs, pré-processamento de texto (tokenização, remoção de stopwords,
  lematização), análise de sentimento usando TextBlob, avaliação de compliance ambiental comparando métricas extraídas com
  thresholds dos UNSDGs, e detecção de greenwashing através de keyword matching combinado com análise de sentimento.

  '
Dados_Descrição: 'Relatórios ESG de 2023 de 15 empresas líderes do setor de óleo e gás (5 empresas por segmento: upstream,
  midstream, downstream). Total de 30 observações (15 empresas × 2 tipos de avaliação: compliance ambiental e greenwashing).
  Dados extraídos de websites públicos das empresas e repositórios de dados de sustentabilidade da ONU.

  '
CategoriaMecanismo: Automação informacional (NLP)
Mecanismo_Fonte: Misto
Mecanismo_Declarado: 'NLP facilita a extração de métricas essenciais nos relatórios, reconhece padrões na linguagem corporativa
  e destaca discrepâncias entre claims declarados e performance real. Técnicas como tokenização, NER e análise de sentimento
  permitem processar grandes volumes de texto e revelar sinais sutis de greenwashing.

  '
Mecanismo_Inferido: 'INFERIDO: A extração automatizada de keywords e dados numéricos dos relatórios ESG reduz a subjetividade
  da análise manual. INFERIDO: A análise de sentimento identifica tom excessivamente positivo sem dados de suporte como indicador
  de greenwashing. INFERIDO: A comparação com thresholds pré-definidos dos UNSDGs padroniza a avaliação de compliance entre
  diferentes empresas.

  '
Mecanismo_Estruturado: Relatórios ESG (PDF) → NLP (extração + sentiment analysis + keyword matching) → Classificação de compliance
  e flags de greenwashing → Avaliação de sustentabilidade e transparência corporativa
ResultadoTipo: Quantitativo
Resultados_Quant: 'Acurácia OGSC: 0.87 (baseline: NR); Precisão OGSC: 0.92 EC e 0.89 GW (baseline: NR); Recall OGSC: 0.92
  EC e 0.88 GW (baseline: NR); F1-Score OGSC: 0.90 EC e 0.87 GW (baseline: NR); ROC AUC: 0.88 (baseline: NR)'
Resultados_Qual: Framework demonstra robustez na avaliação de compliance ambiental e detecção de greenwashing, com melhor
  performance no midstream para compliance e downstream para greenwashing
NívelEvidência: Experimento com dados reais
Limitações_Artigo: 'Dependência excessiva de relatórios ESG para análise de dados; tamanho limitado da amostra; abordagem
  de keyword matching que demanda estudos futuros sobre adaptabilidade e precisão do modelo usando mais datasets e trabalho
  colaborativo com órgãos reguladores.

  '
Observação: 'O framework foi implementado em Python usando Google Colab. Ferramentas principais: pdfminer (extração de PDF),
  nltk (pré-processamento), TextBlob (análise de sentimento), scikit-learn (análise de erros).

  '
