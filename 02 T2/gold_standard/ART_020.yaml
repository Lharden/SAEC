ObjetoCrítico: Import lead times para equipamentos especializados
ProblemaNegócio_Contexto: 'O setor de serviços de óleo e gás opera em cadeias de suprimentos internacionais complexas, onde
  a entrega pontual de equipamentos críticos é crucial para manter operações.

  Empresas dependem de logística eficiente para transportar maquinário especializado para bases operacionais em locais remotos.

  A complexidade logística, requisitos regulatórios diversos, processos alfandegários e coordenação de múltiplos stakeholders
  tornam a estimativa precisa de lead times de importação um fator crítico para gestão de custos e confiabilidade operacional.

  Atrasos em embarques de alto valor resultam em impactos financeiros significativos.'
ClasseIA: Híbrido
ClasseIA_Confiança: Alta
TarefaAnalítica: Previsão
FamíliaModelo: SVM/Kernel; Regressão linear/logística; Redes neurais feedforward
TipoDado: Tabular/ERP
Maturidade: Protótipo
Maturidade_Confiança: Alta
Intervenção_Descrição: 'O estudo integra Business Intelligence (BI) e Machine Learning (ML) dentro do framework CRISP-DM para
  prever lead times de importação. Foram testados múltiplos modelos: Linear Regression, Decision Trees, Random Forests, Gradient
  Boosted Trees, e Support Vector Machines (SVM). Os melhores modelos foram SVM para CFD, Declaration e Transport Lead Time,
  e Linear Regression para Release Lead Time. Técnicas de data augmentation incluíram simulação baseada em AnyLogic e Tabular
  Variational Autoencoder (TVAE) para superar escassez de dados.

  '
Dados_Descrição: 'Dataset original de 180 embarques do Clearance Portal, integrado ao departamento de import-export. Dados
  incluem detalhes de embarque, tempos de processamento alfandegário e cronogramas de transporte. Cerca de 17% dos dados estavam
  faltando, com campos de datas críticas (ATA, Declaration Date, Reception Date) com ~17% missing. Data augmentation gerou
  ~700 registros sintéticos via simulação e ~500 via TVAE, resultando em datasets D2 (880 registros) e D3 (680 registros).
  Período: 2022.

  '
CategoriaMecanismo: Redução de incerteza
Mecanismo_Fonte: Misto
Mecanismo_Declarado: '"By leveraging predictive models, organizations can better forecast potential delays and optimize shipping
  routes, resulting in more accurate scheduling and timely deliveries. This ability to predict disruptions in advance enables
  proactive adjustments, reducing the risk of delays and improving overall operational performance."

  '
Mecanismo_Inferido: 'INFERIDO: Modelos ML capturam relações não-lineares entre variáveis como modo de transporte, porto de
  entrada e broker alfandegário que métodos tradicionais baseados em médias não conseguem capturar. INFERIDO: A previsão antecipada
  de lead times permite alocação proativa de recursos e seleção otimizada de rotas/brokers. INFERIDO: A interface chatbot
  traduz outputs complexos de ML em insights acionáveis, reduzindo barreiras de adoção e acelerando decisões.

  '
Mecanismo_Estruturado: Dados de embarques (ERP/Clearance Portal) → Modelos ML (SVM, Linear Regression) + data augmentation
  (TVAE, simulação) → Previsão de lead times por cenário → Estimativas em tempo real via chatbot para otimização logística
ResultadoTipo: Quantitativo
Resultados_Quant: 'MAE reduction: up to 62% improvement over baseline (MAEref), com avaliação em três conjuntos (D1, D2, D3)
  e quatro lead times (CFD, Declaration, Release, Transport).'
Resultados_Qual: Sistema permite comparações de cenários entre modos de transporte, brokers alfandegários e portos de entrada;
  interface chatbot melhora acessibilidade para especialistas sem expertise técnica; identificação de gargalos como Release
  lead time (média 7.6 dias) como principal bottleneck
NívelEvidência: Estudo de caso real
Limitações_Artigo: 'Dataset restrito ao ano 2022, podendo não capturar variações sazonais ou ano-a-ano. Dados sintéticos TVAE
  podem não capturar nuances de dados reais, especialmente para custos de desembaraço alfandegário altamente variáveis. Restrições
  de domínio codificadas manualmente podem limitar escalabilidade para diferentes produtos ou regiões. Preocupações de privacidade
  e segurança impediram deployment em nuvem em escala completa.

  '
Observação: 'Estudo publicado em 2025 mas com dados de 2022. Framework CRISP-DM aplicado de forma completa. Chatbot desenvolvido
  com Streamlit/Python. Modelos serializados em formato Pickle para deployment.

  '
