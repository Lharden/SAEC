Resultados_Qual: 'Framework conceitual que permite: avaliar eventos de risco em projetos de O&G; suportar decisões durante
  planejamento e implementação; ganhar experiência em gestão de riscos através de bases científicas e documentadas; organizar
  e documentar informações baseadas em conhecimento para tomadores de decisão'
NívelEvidência: Proposta teórica/framework
