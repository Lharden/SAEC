ObjetoCrítico: Rotas de transporte de petróleo bruto (pipelines e shipping) e intensidade de carbono associada
ProblemaNegócio_Contexto: 'A cadeia de suprimentos de petróleo bruto é extremamente complexa, envolvendo centenas de blends
  transportados por milhares de milhas de pipelines e milhões de milhas de rotas marítimas.

  Regulamentações como LCFS, Fuel Quality Directive e CORSIA buscam usar diferenciação por intensidade de carbono como ferramenta
  política, mas são prejudicadas por lacunas de dados e rastreabilidade inadequada da cadeia de suprimentos.

  Estudos existentes não traduzem estimativas de emissões a nível de campos para blends comercializáveis, limitando políticas
  que incentivem demanda por petróleo de baixo carbono.'
ClasseIA: Híbrido
ClasseIA_Confiança: Alta
TarefaAnalítica: Otimização
FamíliaModelo: Metaheurísticas; Clustering; Programação matemática
TipoDado: Multimodal
Maturidade: Protótipo
Maturidade_Confiança: Média
Intervenção_Descrição: 'Desenvolvimento de algoritmo de otimização multi-objetivo para estimar formação de blends de petróleo
  (blend estimation algorithm), combinando gradiente descendente com autodifferentiation, inicialização via aprendizado não
  supervisionado (k-means clustering) e algoritmo genético. O sistema integra rede de supply chain (campos, terminais, refinarias
  como nós; pipelines e rotas de shipping como arestas) com modelos de emissões bottom-up (OPGEE, COPTEM, estimador de shipping
  baseado em AIS).

  '
Dados_Descrição: 'Dados comerciais de Wood Mackenzie, GlobalData, Kpler e S&P Global para localização de campos, terminais,
  pipelines, refinarias, rotas de comércio e shipping. Dados públicos NASA MODIS (temperatura de superfície) e Shuttle Radar
  Topography Mission (elevação). Dados AIS (Automatic Identification System) terrestres e satelitais para rastreamento de
  navios. Cobertura de ~98% da produção global de petróleo bruto em 2015 (~95% petróleo, ~3% condensado).

  '
CategoriaMecanismo: Integração de dados dispersos
Mecanismo_Fonte: Misto
Mecanismo_Declarado: '"Using high-fidelity datasets, optimization algorithms to facilitate supply chain traceability and bottom-up,
  physics-based emission estimators, we show that the variability in global well-to-refinery-entrance carbon intensities at
  the level of crude trade pathways is significant." A otimização multi-objetivo permite estimar como campos contribuem para
  blends considerando distância, conectividade, volume e API, gerando rastreabilidade que não existia previamente.

  '
Mecanismo_Inferido: 'INFERIDO: A integração de múltiplas fontes de dados dispersos (comerciais, satelitais, geoespaciais)
  em uma rede unificada permite visibilidade end-to-end da cadeia. INFERIDO: O algoritmo de otimização com clustering reduz
  incerteza na atribuição campo-blend ao considerar múltiplos objetivos simultaneamente. INFERIDO: A granularidade pathway-level
  permite identificar oportunidades específicas de intervenção política em vez de abordagens genéricas.

  '
Mecanismo_Estruturado: Dados multi-fonte (campos, pipelines, shipping, propriedades de crude) → Otimização multi-objetivo
  + clustering + rede supply chain → Rastreabilidade pathway-level → Intensidade de carbono por rota comercial
ResultadoTipo: Quantitativo
Resultados_Quant: 'CI global well-to-refinery: 4.2-214.1 kg-CO2eq/bbl, média ponderada 50.5 kg-CO2eq/bbl (baseline: NR); CI
  midstream médio: 5.37 kg-CO2eq/bbl (~10% do total); Potencial de economia CO2eq sob cenários 1.5°C: 1.5-6.1 Gt até 2050
  (baseline: cenário sem priorização de baixo carbono)'
Resultados_Qual: 'Demonstração de alta variabilidade inter-blend e intra-blend em intensidade de carbono; identificação de
  padrões regionais distintos (ex: Rússia com baixa variabilidade vs Canadá/Irã com alta); habilitação de políticas de diferenciação
  por CI a nível de pathway'
NívelEvidência: Simulação com dados reais
Limitações_Artigo: 'Análise estática anualizada não captura variabilidade temporal (condições operacionais, buffers de estoque,
  padrões dinâmicos de tankers). Exclusão de barcaças, caminhões e transporte ferroviário devido a indisponibilidade de dados.
  Campos de petróleo representados por coordenadas pontuais em vez de áreas/shapes. Dados não disponíveis para estimativa
  bottom-up de emissões de infraestrutura de gathering and boosting.

  '
Observação: 'O estudo foca em estimativa de emissões de carbono na cadeia de suprimentos de petróleo bruto, não em gestão
  de riscos operacionais típicos de SCM. A aplicação de IA (otimização + clustering) visa rastreabilidade para políticas de
  descarbonização. Publicado na Nature Communications, alto impacto científico.

  '
