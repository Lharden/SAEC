Intervenção_Descrição: |
  O estudo propõe um algoritmo híbrido que integra Graph Attention Networks (GAT) com Monte Carlo Markov Chain (MCMC).
  O GAT prioriza nós/componentes mais críticos no grafo do WBS e o MCMC simula cenários com incerteza operacional.
  A combinação ajusta iterativamente pesos de atenção para otimizar emissões, lead time e custos.

Dados_Descrição: |
  Foi gerado um dataset sintético com 15,000 empresas envolvidas na produção de navios de petróleo na Europa.
  Cada empresa possui identificador, atividades e métricas de CO2, lead time, cost savings e financial health.
  A estrutura do problema foi modelada como DAG para representar dependências entre componentes/processos do WBS.

CategoriaMecanismo: "Otimização de trade-offs"
Mecanismo_Fonte: "Misto"
Mecanismo_Declarado: |
  The GAT assigns dynamic attention weights to these nodes, prioritizing those with the most significant impact on the overall supply chain.
  The MCMC method is used to simulate various scenarios within the supply chain, accounting for uncertainties such as fluctuating material availability or unexpected delays.
  The combined GAT-MCMC algorithm iteratively refines the WBS configurations by adjusting the attention weights in response to the MCMC outputs.
Mecanismo_Inferido: "INFERIDO: A representação em DAG torna explícitas as dependências e permite focar caminhos críticos do WBS. INFERIDO: O mecanismo de atenção do GAT prioriza componentes com maior influência simultânea em emissões, prazo e custo. INFERIDO: O MCMC testa robustez sob cenários incertos e sustenta decisões de trade-off mais estáveis."
Mecanismo_Estruturado: "WBS em DAG + métricas operacionais → GAT (atenção dinâmica) + MCMC (simulação probabilística) → Priorização de componentes e cenários → Otimização conjunta de CO2, lead time e custos"

ResultadoTipo: "Misto"
Resultados_Quant: "Redução de CO2: 22% (vs. baseline: 500 para 390 metric tons por vessel); Redução de lead time: 16% (vs. baseline: 24 para 20.2 months); Cost savings: 15% (vs. baseline: NR); Financial health score: 7.85 (vs. baseline: 7.2)"
Resultados_Qual: "Os resultados indicam capacidade robusta de otimização multidimensional da cadeia, conciliando objetivos ambientais e financeiros."
NívelEvidência: "Simulação com dados sintéticos"
Limitações_Artigo: |
  This combination has shown potential in supply chain optimization but requires rigorous testing to confirm its effectiveness in real-world applications.

