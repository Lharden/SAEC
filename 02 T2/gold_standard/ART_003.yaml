ObjetoCrítico: "Configuração de WBS e decisões de produção para navios de petróleo"

ProblemaNegócio_Contexto: |
  O setor de produção de navios de petróleo precisa reduzir emissões sem perder eficiência operacional.
  O artigo destaca pressão regulatória crescente (como IMO 2020 e ETS) e necessidade de decisões mais inteligentes na cadeia.
  O problema envolve otimizar Work Breakdown Structure com múltiplos objetivos simultâneos.
  Métodos tradicionais têm dificuldade de tratar interdependências do grafo produtivo e incertezas operacionais.

